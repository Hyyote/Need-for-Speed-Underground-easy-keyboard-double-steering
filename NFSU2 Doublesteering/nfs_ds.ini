; NFS Underground - Keyboard Double Steering
; Just hold Left/Right arrow. Double steering is automatic.

[DoubleSteering]
Enabled=1

; Partial deflection percentage (5-95%)
; RWD cars: 40-50
; FWD cars: 20-35
DeflectionPercent=45

; Frames between full-lock spikes
; Lower = more aggressive
PulseInterval=8

; How many frames each spike lasts
PulseDuration=2
