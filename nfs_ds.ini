; ═══════════════════════════════════════════════════════════
; NFS Underground - Keyboard Double Steering
; ═══════════════════════════════════════════════════════════
; Just hold Left/Right arrow. Double steering is automatic.
;
; Forces wheel mode (no steering smoothing) and pulses
; between partial angle and full lock to trigger drifts.
; ═══════════════════════════════════════════════════════════

[DoubleSteering]
Enabled=1

; Partial angle between spikes (5-95%)
; RWD: 40-50, FWD: 20-35
DeflectionPercent=45

; Frames between full-lock spikes (2-60)
; Lower = more aggressive
PulseInterval=8

; How many frames each spike lasts (1 to interval-1)
PulseDuration=2
