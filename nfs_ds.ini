/*
 * NFS Underground 1 - Keyboard Double Steering ASI Plugin
 * ========================================================
 * Self-calibrating — finds the steering float automatically.
 * Works on any game version. No Cheat Engine needed.
 *
 * How it works:
 *   1. Waits for you to steer (arrow keys) during a race
 *   2. Scans game memory for floats that match ±1.0
 *   3. When you release, checks which ones return to 0.0
 *   4. After 2-3 steers, locks onto the correct address
 *   5. Applies double steering pattern automatically
 *
 * Build (mingw-w64, 32-bit):
 *   i686-w64-mingw32-gcc -shared -o nfs_ds.asi nfs_ds.c
 *       -static-libgcc -O2 -lwinmm
 */

#define WIN32_LEAN_AND_MEAN
#include <windows.h>
#include <math.h>
#include <stdio.h>
#include <string.h>

/* ═══════════════════════════════════════════════════════════════
 * Configuration
 * ═══════════════════════════════════════════════════════════════ */

static float g_partial       = 0.45f;  /* Partial deflection (0.0-1.0) */
static int   g_interval      = 8;      /* Frames per pulse cycle */
static int   g_duration      = 2;      /* Frames at full lock per cycle */
static int   g_enabled       = 1;

/* Double steering state */
static int   g_frame         = 0;
static int   g_prevDir       = 0;

/* Calibration */
#define MAX_CAND 16384

static DWORD *g_cand         = NULL;   /* Candidate addresses */
static int    g_numCand      = 0;
static float *g_steerPtr     = NULL;   /* Confirmed steering float */
static int    g_calibState   = 0;      /* Calibration state machine */
static int    g_calibDir     = 0;      /* Direction during calibration */
static BOOL   g_prevLeft     = FALSE;
static BOOL   g_prevRight    = FALSE;
static int    g_validFrames  = 0;      /* Consecutive valid frames after calibration */
static int    g_invalidCount = 0;      /* Consecutive invalid reads */

/* Logging */
static FILE  *g_log          = NULL;

/* ═══════════════════════════════════════════════════════════════
 * Logging
 * ═══════════════════════════════════════════════════════════════ */

static void log_msg(const char *fmt, ...)
{
    if (!g_log) return;
    va_list a;
    va_start(a, fmt);
    vfprintf(g_log, fmt, a);
    va_end(a);
    fflush(g_log);
}

static void open_log(void)
{
    char path[MAX_PATH];
    GetModuleFileNameA(NULL, path, MAX_PATH);
    char *p = strrchr(path, '\\');
    if (p) *(p + 1) = '\0';
    strcat(path, "nfs_ds.log");
    g_log = fopen(path, "w");
}

/* ═══════════════════════════════════════════════════════════════
 * Config
 * ═══════════════════════════════════════════════════════════════ */

static void load_config(void)
{
    char ini[MAX_PATH];
    GetModuleFileNameA(NULL, ini, MAX_PATH);
    char *p = strrchr(ini, '\\');
    if (p) *(p + 1) = '\0';
    strcat(ini, "nfs_ds.ini");

    int pct = GetPrivateProfileIntA("DoubleSteering", "DeflectionPercent", 45, ini);
    if (pct < 5)  pct = 5;
    if (pct > 95) pct = 95;
    g_partial = pct / 100.0f;

    g_enabled = GetPrivateProfileIntA("DoubleSteering", "Enabled", 1, ini);

    g_interval = GetPrivateProfileIntA("DoubleSteering", "PulseInterval", 8, ini);
    if (g_interval < 2)  g_interval = 2;
    if (g_interval > 60) g_interval = 60;

    g_duration = GetPrivateProfileIntA("DoubleSteering", "PulseDuration", 2, ini);
    if (g_duration < 1) g_duration = 1;
    if (g_duration >= g_interval) g_duration = g_interval - 1;
}

/* ═══════════════════════════════════════════════════════════════
 * Memory scanning
 *
 * Scans committed, readable memory for float values.
 * Uses VirtualQuery to enumerate valid pages — no crashes.
 * ═══════════════════════════════════════════════════════════════ */

static BOOL page_readable(DWORD addr)
{
    MEMORY_BASIC_INFORMATION mbi;
    if (!VirtualQuery((PVOID)addr, &mbi, sizeof(mbi)))
        return FALSE;
    if (mbi.State != MEM_COMMIT)
        return FALSE;
    if (mbi.Protect & (PAGE_NOACCESS | PAGE_GUARD))
        return FALSE;
    DWORD ok = PAGE_READONLY | PAGE_READWRITE |
               PAGE_EXECUTE_READ | PAGE_EXECUTE_READWRITE |
               PAGE_WRITECOPY | PAGE_EXECUTE_WRITECOPY;
    return (mbi.Protect & ok) != 0;
}

/*
 * Scan all readable memory for aligned floats matching target.
 * Only scans heap/data regions (skips code sections).
 * Stores results in g_cand[], sets g_numCand.
 */
static void scan_for_float(float target)
{
    MEMORY_BASIC_INFORMATION mbi;
    DWORD addr = 0x10000;  /* Skip null page */

    g_numCand = 0;

    while (addr < 0x7FFE0000 && g_numCand < MAX_CAND) {
        if (VirtualQuery((PVOID)addr, &mbi, sizeof(mbi)) == 0) {
            addr += 0x1000;
            continue;
        }

        DWORD regionEnd = (DWORD)mbi.BaseAddress + (DWORD)mbi.RegionSize;

        if (mbi.State == MEM_COMMIT &&
            !(mbi.Protect & (PAGE_NOACCESS | PAGE_GUARD)) &&
            (mbi.Protect & (PAGE_READWRITE | PAGE_EXECUTE_READWRITE |
                            PAGE_WRITECOPY | PAGE_EXECUTE_WRITECOPY)))
        {
            /* Only scan writable pages (steering float must be writable) */
            DWORD base = (DWORD)mbi.BaseAddress;
            DWORD end  = regionEnd - 3;

            /* Align to 4 bytes */
            if (base & 3) base = (base + 3) & ~3;

            for (DWORD a = base; a <= end && g_numCand < MAX_CAND; a += 4) {
                float val = *(float *)a;
                if (fabsf(val - target) < 0.001f) {
                    g_cand[g_numCand++] = a;
                }
            }
        }

        addr = regionEnd;
    }
}

/*
 * Filter existing candidates: keep only those whose current
 * value matches target (within tolerance).
 */
static void filter_candidates(float target)
{
    int kept = 0;
    for (int i = 0; i < g_numCand; i++) {
        if (page_readable(g_cand[i])) {
            float val = *(float *)g_cand[i];
            if (fabsf(val - target) < 0.001f) {
                g_cand[kept++] = g_cand[i];
            }
        }
    }
    g_numCand = kept;
}

/*
 * Extra validation: verify that a candidate ONLY holds values
 * from the set {-1.0, 0.0, 1.0}. If it holds anything else,
 * it's not the steering float.
 */
static BOOL validate_steering_value(float val)
{
    return (fabsf(val) < 0.001f ||
            fabsf(val - 1.0f) < 0.001f ||
            fabsf(val + 1.0f) < 0.001f);
}

/* ═══════════════════════════════════════════════════════════════
 * Calibration state machine
 *
 * State 0: Waiting for player to steer (press left/right)
 *   → Scan memory for ±1.0, store candidates
 *   → Go to state 1
 *
 * State 1: Waiting for player to release
 *   → Filter: keep candidates that are now 0.0
 *   → If few enough, go to state 3 (calibrated)
 *   → Otherwise go to state 2
 *
 * State 2: Waiting for player to steer again
 *   → Filter: keep candidates that are now ±1.0
 *   → If few enough, calibrate
 *   → Otherwise go back to state 1
 *
 * State 3: Calibrated — apply double steering
 * ═══════════════════════════════════════════════════════════════ */

static void calibration_tick(BOOL leftHeld, BOOL rightHeld)
{
    BOOL steering    = leftHeld || rightHeld;
    BOOL wasSteering = g_prevLeft || g_prevRight;
    BOOL justPressed  = steering && !wasSteering;
    BOOL justReleased = !steering && wasSteering;

    switch (g_calibState) {

    case 0: /* Waiting for first steer */
        if (justPressed) {
            g_calibDir = leftHeld ? -1 : 1;

            /* Brief delay for game to process input */
            Sleep(80);

            /* Scan for expected steering value */
            float target = (g_calibDir < 0) ? -1.0f : 1.0f;
            scan_for_float(target);
            log_msg("Phase 1: Scanned for %.1f, found %d candidates\n",
                    target, g_numCand);

            if (g_numCand > 0 && g_numCand < MAX_CAND) {
                g_calibState = 1;
            } else {
                log_msg("  Too many or zero candidates, retrying...\n");
                /* Stay in state 0 */
            }
        }
        break;

    case 1: /* Waiting for release */
        if (justReleased) {
            Sleep(80);
            filter_candidates(0.0f);
            log_msg("Phase 2: After release, %d candidates remain\n", g_numCand);

            if (g_numCand == 0) {
                log_msg("  Lost all candidates. Restarting.\n");
                g_calibState = 0;
            } else if (g_numCand <= 3) {
                g_steerPtr = (float *)g_cand[0];
                g_calibState = 3;
                g_validFrames = 0;
                log_msg("CALIBRATED: steering float at 0x%08X\n",
                        (unsigned int)g_cand[0]);
            } else {
                g_calibState = 2;
            }
        }
        break;

    case 2: /* Waiting for second steer */
        if (justPressed) {
            g_calibDir = leftHeld ? -1 : 1;
            Sleep(80);
            float target = (g_calibDir < 0) ? -1.0f : 1.0f;
            filter_candidates(target);
            log_msg("Phase 3: After re-steer, %d candidates remain\n", g_numCand);

            if (g_numCand == 0) {
                log_msg("  Lost all candidates. Restarting.\n");
                g_calibState = 0;
            } else if (g_numCand <= 5) {
                g_steerPtr = (float *)g_cand[0];
                g_calibState = 3;
                g_validFrames = 0;
                log_msg("CALIBRATED: steering float at 0x%08X\n",
                        (unsigned int)g_cand[0]);
            } else {
                /* Need more narrowing — go back to state 1 */
                g_calibState = 1;
                log_msg("  Still too many candidates. Repeating.\n");
            }
        }
        break;

    case 3: /* Calibrated */
        break;
    }
}

/* ═══════════════════════════════════════════════════════════════
 * Double steering application
 *
 * Reads the game's steering float. If the player is steering
 * (value ±1.0), replaces it with the pulse pattern:
 *   - Most frames: partial deflection (analog hold)
 *   - Every N frames: full lock spike (digital tap)
 * ═══════════════════════════════════════════════════════════════ */

static void apply_double_steering(void)
{
    if (!g_steerPtr) return;

    /* Verify address is still valid */
    if (!page_readable((DWORD)g_steerPtr)) {
        g_invalidCount++;
        if (g_invalidCount > 100) {
            log_msg("Steering address invalid. Re-calibrating.\n");
            g_steerPtr = NULL;
            g_calibState = 0;
            g_invalidCount = 0;
        }
        return;
    }
    g_invalidCount = 0;

    float raw = *g_steerPtr;

    /* Validate the value looks like a steering float */
    if (!validate_steering_value(raw)) {
        /* Value is not -1, 0, or 1 — might have wrong address */
        g_validFrames = 0;
        return;
    }

    /* No steering input — reset */
    if (fabsf(raw) < 0.001f) {
        g_frame = 0;
        g_prevDir = 0;
        g_validFrames++;
        return;
    }

    g_validFrames++;

    /* Don't modify until we've seen enough valid frames */
    if (g_validFrames < 30) return;

    /* Direction */
    int dir = (raw < 0.0f) ? -1 : 1;

    /* Reset counter on direction change */
    if (dir != g_prevDir) {
        g_frame = 0;
        g_prevDir = dir;
    }

    /* Double steering pattern */
    int pos = g_frame % g_interval;
    float direction = (dir < 0) ? -1.0f : 1.0f;

    if (pos < g_duration) {
        /* Digital spike — full lock */
        *g_steerPtr = direction * 1.0f;
    } else {
        /* Analog hold — partial deflection */
        *g_steerPtr = direction * g_partial;
    }

    g_frame++;
}

/* ═══════════════════════════════════════════════════════════════
 * Main polling thread
 *
 * Runs at ~1000Hz for responsive steering modification.
 * Calibrates first, then applies double steering every tick.
 * ═══════════════════════════════════════════════════════════════ */

static volatile BOOL g_running = TRUE;

static DWORD WINAPI ds_thread(LPVOID param)
{
    (void)param;

    /* Request 1ms timer resolution */
    timeBeginPeriod(1);

    /* Wait for game to fully initialize */
    Sleep(5000);
    log_msg("Thread started. Steer left/right to calibrate.\n");

    /* Allocate candidate array */
    g_cand = (DWORD *)VirtualAlloc(NULL, MAX_CAND * sizeof(DWORD),
                                    MEM_COMMIT | MEM_RESERVE,
                                    PAGE_READWRITE);
    if (!g_cand) {
        log_msg("FATAL: Failed to allocate candidate array\n");
        timeEndPeriod(1);
        return 1;
    }

    /* Main loop */
    while (g_running) {
        BOOL leftHeld  = (GetAsyncKeyState(VK_LEFT)  & 0x8000) != 0;
        BOOL rightHeld = (GetAsyncKeyState(VK_RIGHT) & 0x8000) != 0;

        if (g_calibState < 3) {
            calibration_tick(leftHeld, rightHeld);
        } else {
            apply_double_steering();
        }

        g_prevLeft  = leftHeld;
        g_prevRight = rightHeld;

        Sleep(1);  /* ~1000Hz polling */
    }

    timeEndPeriod(1);
    return 0;
}

/* ═══════════════════════════════════════════════════════════════
 * DllMain
 * ═══════════════════════════════════════════════════════════════ */

BOOL WINAPI DllMain(HINSTANCE hinstDLL, DWORD fdwReason,
                    LPVOID lpvReserved)
{
    (void)hinstDLL;
    (void)lpvReserved;

    if (fdwReason == DLL_PROCESS_ATTACH) {
        DisableThreadLibraryCalls(hinstDLL);

        open_log();
        log_msg("nfs_ds: Double Steering Plugin loaded\n");

        load_config();
        log_msg("Config: deflection=%.0f%% interval=%d duration=%d enabled=%d\n",
                g_partial * 100, g_interval, g_duration, g_enabled);

        if (!g_enabled) {
            log_msg("Plugin disabled by config\n");
            return TRUE;
        }

        CreateThread(NULL, 0, ds_thread, NULL, 0, NULL);
    }

    if (fdwReason == DLL_PROCESS_DETACH) {
        g_running = FALSE;
        Sleep(50);  /* Let thread exit cleanly */
        if (g_cand) VirtualFree(g_cand, 0, MEM_RELEASE);
        if (g_log) {
            log_msg("Plugin unloaded\n");
            fclose(g_log);
        }
    }

    return TRUE;
}